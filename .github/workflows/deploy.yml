name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['fase2/**']
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: fase2/pnpm-lock.yaml

      - name: Instalar dependencias
        run: pnpm install
        working-directory: fase2

      - name: Compilar
        run: pnpm build
        working-directory: fase2
        env:
          GITHUB_ACTIONS: true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: fase2/dist

      - uses: actions/deploy-pages@v4
        id: deployment
